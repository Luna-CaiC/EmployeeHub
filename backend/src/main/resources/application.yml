spring:
  application:
    name: employeehub-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/employeehub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT:1}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        boot:
          allow_jdbc_metadata_access: ${HIBERNATE_JDBC_METADATA_ACCESS:true}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
